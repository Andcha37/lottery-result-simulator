<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로또 결과 확인</title>

    <style>
        :root {
            --bg: #f5f7fb;
            --ink: #17202a;
            --muted: #667085;
            --line: #d9e2ec;
            --primary: #0f9f7a;
            --primary-dark: #08785d;
            --warn: #d92d20;
            --gold: #f6be3b;
            --blue: #4e8fe8;
            --red: #dd4b39;
            --black: #333742;
            --green: #33a96b;
            --panel: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(246, 190, 59, 0.18), transparent 30rem),
                radial-gradient(circle at bottom right, rgba(15, 159, 122, 0.16), transparent 28rem),
                var(--bg);
            color: var(--ink);
            font-family: "Segoe UI", "Malgun Gothic", Arial, sans-serif;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(15, 159, 122, 0.96);
            color: white;
            box-shadow: 0 8px 24px rgba(15, 159, 122, 0.22);
        }

        .topbar-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: min(1080px, calc(100% - 32px));
            margin: 0 auto;
            padding: 16px 0;
        }

        .brand {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0;
        }

        .draw-state {
            font-size: 14px;
            opacity: 0.9;
        }

        main {
            width: min(1080px, calc(100% - 32px));
            margin: 34px auto 56px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid rgba(23, 32, 42, 0.08);
            border-radius: 8px;
            box-shadow: 0 18px 42px rgba(23, 32, 42, 0.09);
            padding: 28px;
        }

        .grid {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
            gap: 22px;
        }

        h1,
        h2 {
            margin: 0;
            letter-spacing: 0;
        }

        h1 {
            font-size: clamp(28px, 5vw, 48px);
            line-height: 1.12;
        }

        h2 {
            font-size: 20px;
            margin-bottom: 18px;
        }

        .lead {
            margin: 14px 0 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.7;
        }

        .section {
            margin-top: 22px;
        }

        .balls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }

        .ball,
        .number-input {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            box-shadow: inset 0 -8px 14px rgba(0, 0, 0, 0.16), 0 10px 20px rgba(23, 32, 42, 0.14);
            transition: transform 180ms ease, box-shadow 180ms ease, outline-color 180ms ease;
        }

        .number-input {
            border: 0;
            outline: 3px solid transparent;
            background: linear-gradient(145deg, #f6be3b, #e8a911);
            appearance: textfield;
        }

        .number-input::-webkit-outer-spin-button,
        .number-input::-webkit-inner-spin-button {
            margin: 0;
            appearance: none;
        }

        .number-input:focus {
            transform: translateY(-3px) scale(1.04);
            outline-color: rgba(15, 159, 122, 0.34);
            box-shadow: inset 0 -8px 14px rgba(0, 0, 0, 0.16), 0 16px 30px rgba(15, 159, 122, 0.24);
        }

        .number-input.match {
            background: linear-gradient(145deg, #dd4b39, #b92d23);
            animation: pop 460ms ease;
        }

        .number-input.bonus-match {
            background: linear-gradient(145deg, #4e8fe8, #2564c8);
            animation: pop 460ms ease;
        }

        .number-input.miss {
            background: linear-gradient(145deg, #8a94a6, #667085);
        }

        .yellow {
            background: linear-gradient(145deg, #f6be3b, #e8a911);
        }

        .blue {
            background: linear-gradient(145deg, #4e8fe8, #2564c8);
        }

        .red {
            background: linear-gradient(145deg, #dd4b39, #b92d23);
        }

        .black {
            background: linear-gradient(145deg, #4b5565, #262b36);
        }

        .green {
            background: linear-gradient(145deg, #33a96b, #16824e);
        }

        .bonus-plus {
            color: var(--muted);
            font-size: 30px;
            font-weight: 800;
            line-height: 1;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 22px;
        }

        button {
            min-height: 44px;
            border: 0;
            border-radius: 8px;
            padding: 0 18px;
            color: white;
            background: var(--primary);
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(15, 159, 122, 0.22);
            transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
        }

        button:hover {
            transform: translateY(-2px);
            background: var(--primary-dark);
            box-shadow: 0 14px 28px rgba(15, 159, 122, 0.26);
        }

        button.secondary {
            color: var(--ink);
            background: #eef2f7;
            box-shadow: none;
        }

        button.secondary:hover {
            background: #e0e7ef;
            box-shadow: none;
        }

        .hint,
        .error {
            min-height: 24px;
            margin-top: 14px;
            font-size: 14px;
            line-height: 1.6;
        }

        .hint {
            color: var(--muted);
        }

        .error {
            color: var(--warn);
            font-weight: 700;
        }

        .result-box {
            display: grid;
            gap: 14px;
        }

        .prize {
            border-radius: 8px;
            background: #f7fafc;
            border: 1px solid var(--line);
            padding: 20px;
            min-height: 132px;
        }

        .prize-label {
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        .prize-title {
            margin-top: 8px;
            font-size: 30px;
            font-weight: 900;
        }

        .prize-money {
            margin-top: 6px;
            color: var(--primary-dark);
            font-size: 20px;
            font-weight: 900;
        }

        .match-summary {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
        }

        .winning-wrap {
            margin-top: 22px;
        }

        .masked {
            min-height: 64px;
            border: 1px dashed var(--line);
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 14px;
            color: var(--muted);
            background: #fbfdff;
        }

        .fade-in {
            animation: fadeIn 520ms ease both;
        }

        .shake {
            animation: shake 320ms ease;
        }

        .confetti {
            position: fixed;
            top: -12px;
            width: 9px;
            height: 16px;
            border-radius: 2px;
            pointer-events: none;
            z-index: 50;
            animation: fall 1100ms ease-in forwards;
        }

        @keyframes pop {
            0% { transform: scale(0.88); }
            55% { transform: scale(1.12); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-7px); }
            75% { transform: translateX(7px); }
        }

        @keyframes fall {
            to {
                opacity: 0;
                transform: translateY(100vh) rotate(420deg);
            }
        }

        @media (max-width: 820px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .topbar-inner,
            main {
                width: min(100% - 24px, 1080px);
            }

            .panel {
                padding: 20px;
            }

            .ball,
            .number-input {
                width: 54px;
                height: 54px;
                font-size: 19px;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand">LOTTO</div>
            <div class="draw-state" id="drawState">새 당첨번호 준비됨</div>
        </div>
    </header>

    <main>
        <section class="panel">
            <div class="grid">
                <div>
                    <h1>내 번호로 바로 확인하기</h1>
                    <p class="lead">공 6개에 1부터 45까지의 숫자를 직접 입력하고 결과를 확인하세요. 페이지를 새로 열 때마다 당첨번호가 다시 뽑힙니다.</p>

                    <div class="section">
                        <h2>내 번호</h2>
                        <div class="balls" id="inputBalls">
                            <input class="number-input" type="number" min="1" max="45" inputmode="numeric" aria-label="첫 번째 번호">
                            <input class="number-input" type="number" min="1" max="45" inputmode="numeric" aria-label="두 번째 번호">
                            <input class="number-input" type="number" min="1" max="45" inputmode="numeric" aria-label="세 번째 번호">
                            <input class="number-input" type="number" min="1" max="45" inputmode="numeric" aria-label="네 번째 번호">
                            <input class="number-input" type="number" min="1" max="45" inputmode="numeric" aria-label="다섯 번째 번호">
                            <input class="number-input" type="number" min="1" max="45" inputmode="numeric" aria-label="여섯 번째 번호">
                        </div>
                        <div class="error" id="errorMessage"></div>
                        <div class="actions">
                            <button type="button" id="checkButton">결과 확인</button>
                            <button type="button" class="secondary" id="quickPickButton">자동 입력</button>
                            <button type="button" class="secondary" id="resetButton">새 당첨번호</button>
                        </div>
                    </div>

                    <div class="winning-wrap">
                        <h2>당첨 번호</h2>
                        <div id="winningNumbers" class="masked">결과를 확인하면 이번 당첨번호가 공개됩니다.</div>
                    </div>
                </div>

                <aside class="result-box">
                    <h2>결과</h2>
                    <div class="prize" id="resultBox">
                        <div class="prize-label">아직 확인 전</div>
                        <div class="prize-title">대기 중</div>
                        <div class="prize-money">번호를 입력해 주세요</div>
                    </div>
                    <div class="match-summary" id="matchSummary">같은 번호는 한 번만 입력할 수 있습니다.</div>
                </aside>
            </div>
        </section>
    </main>

    <script>
        const inputs = Array.from(document.querySelectorAll(".number-input"));
        const errorMessage = document.getElementById("errorMessage");
        const winningNumbersEl = document.getElementById("winningNumbers");
        const resultBox = document.getElementById("resultBox");
        const matchSummary = document.getElementById("matchSummary");
        const drawState = document.getElementById("drawState");
        const checkButton = document.getElementById("checkButton");
        const quickPickButton = document.getElementById("quickPickButton");
        const resetButton = document.getElementById("resetButton");

        let winningNumbers = drawWinningNumbers();
        let hasChecked = false;

        function generateNumbers(count) {
            const numbers = [];
            while (numbers.length < count) {
                const number = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(number)) {
                    numbers.push(number);
                }
            }
            return numbers;
        }

        function drawWinningNumbers() {
            const main = generateNumbers(6).sort((a, b) => a - b);
            let bonus = Math.floor(Math.random() * 45) + 1;
            while (main.includes(bonus)) {
                bonus = Math.floor(Math.random() * 45) + 1;
            }
            return [...main, bonus];
        }

        function getColor(number) {
            if (number <= 10) return "yellow";
            if (number <= 20) return "blue";
            if (number <= 30) return "red";
            if (number <= 40) return "black";
            return "green";
        }

        function formatWon(amount) {
            return amount.toLocaleString("ko-KR") + "원";
        }

        function rankFor(mainCount, bonusMatch) {
            if (mainCount === 6) {
                return { title: "1등", money: 1000000000, burst: true };
            }
            if (mainCount === 5 && bonusMatch) {
                return { title: "2등", money: 50000000, burst: true };
            }
            if (mainCount === 5) {
                return { title: "3등", money: 1000000, burst: true };
            }
            if (mainCount === 4) {
                return { title: "4등", money: 50000, burst: true };
            }
            if (mainCount === 3) {
                return { title: "5등", money: 5000, burst: false };
            }
            return { title: "꽝", money: 0, burst: false };
        }

        function validateNumbers() {
            const numbers = inputs.map((input) => Number(input.value));

            if (numbers.some((number) => !Number.isInteger(number))) {
                return { ok: false, message: "공 6개를 모두 입력해 주세요." };
            }

            if (numbers.some((number) => number < 1 || number > 45)) {
                return { ok: false, message: "번호는 1부터 45까지만 입력할 수 있습니다." };
            }

            if (new Set(numbers).size !== numbers.length) {
                return { ok: false, message: "중복된 번호가 있습니다. 서로 다른 번호 6개를 입력해 주세요." };
            }

            return { ok: true, numbers };
        }

        function renderWinningNumbers() {
            const mainBalls = winningNumbers.slice(0, 6).map((number) => {
                return `<span class="ball ${getColor(number)}">${number}</span>`;
            }).join("");
            const bonusBall = `<span class="ball ${getColor(winningNumbers[6])}">${winningNumbers[6]}</span>`;
            winningNumbersEl.className = "balls fade-in";
            winningNumbersEl.innerHTML = mainBalls + '<span class="bonus-plus">+</span>' + bonusBall;
        }

        function clearInputEffects() {
            inputs.forEach((input) => {
                input.classList.remove("match", "bonus-match", "miss", "shake");
            });
        }

        function checkResult() {
            clearInputEffects();
            errorMessage.textContent = "";
            const validation = validateNumbers();

            if (!validation.ok) {
                errorMessage.textContent = validation.message;
                inputs.forEach((input) => input.classList.add("shake"));
                window.setTimeout(() => inputs.forEach((input) => input.classList.remove("shake")), 360);
                return;
            }

            const numbers = validation.numbers;
            const mainWinning = winningNumbers.slice(0, 6);
            const bonus = winningNumbers[6];
            const mainCount = numbers.filter((number) => mainWinning.includes(number)).length;
            const bonusMatch = numbers.includes(bonus);
            const result = rankFor(mainCount, bonusMatch);

            inputs.forEach((input) => {
                const number = Number(input.value);
                if (mainWinning.includes(number)) {
                    input.classList.add("match");
                } else if (number === bonus) {
                    input.classList.add("bonus-match");
                } else {
                    input.classList.add("miss");
                }
            });

            hasChecked = true;
            drawState.textContent = "이번 당첨번호 공개됨";
            renderWinningNumbers();
            resultBox.classList.remove("fade-in");
            void resultBox.offsetWidth;
            resultBox.classList.add("fade-in");
            resultBox.innerHTML = `
                <div class="prize-label">확인 완료</div>
                <div class="prize-title">${result.title}</div>
                <div class="prize-money">${formatWon(result.money)}</div>
            `;
            matchSummary.textContent = `일반 번호 ${mainCount}개 일치` + (bonusMatch ? ", 보너스 번호 일치" : ", 보너스 번호 불일치");

            if (result.burst) {
                launchConfetti();
            }
        }

        function quickPick() {
            const picks = generateNumbers(6).sort((a, b) => a - b);
            clearInputEffects();
            inputs.forEach((input, index) => {
                input.value = picks[index];
            });
            errorMessage.textContent = "";
        }

        function resetDraw() {
            winningNumbers = drawWinningNumbers();
            hasChecked = false;
            clearInputEffects();
            errorMessage.textContent = "";
            drawState.textContent = "새 당첨번호 준비됨";
            winningNumbersEl.className = "masked";
            winningNumbersEl.textContent = "결과를 확인하면 이번 당첨번호가 공개됩니다.";
            resultBox.classList.remove("fade-in");
            resultBox.innerHTML = `
                <div class="prize-label">아직 확인 전</div>
                <div class="prize-title">대기 중</div>
                <div class="prize-money">번호를 입력해 주세요</div>
            `;
            matchSummary.textContent = "새 당첨번호가 준비되었습니다.";
        }

        function launchConfetti() {
            const colors = ["#f6be3b", "#4e8fe8", "#dd4b39", "#33a96b", "#17202a"];
            for (let i = 0; i < 42; i += 1) {
                const piece = document.createElement("span");
                piece.className = "confetti";
                piece.style.left = Math.random() * 100 + "vw";
                piece.style.backgroundColor = colors[i % colors.length];
                piece.style.animationDelay = Math.random() * 260 + "ms";
                piece.style.transform = `rotate(${Math.random() * 180}deg)`;
                document.body.appendChild(piece);
                window.setTimeout(() => piece.remove(), 1500);
            }
        }

        inputs.forEach((input, index) => {
            input.addEventListener("input", () => {
                input.value = input.value.replace(/[^0-9]/g, "").slice(0, 2);
                clearInputEffects();
                errorMessage.textContent = "";
                if (input.value.length === 2 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
        });

        checkButton.addEventListener("click", checkResult);
        quickPickButton.addEventListener("click", quickPick);
        resetButton.addEventListener("click", resetDraw);

        document.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                checkResult();
            }
        });

        if (!hasChecked) {
            drawState.textContent = "새 당첨번호 준비됨";
        }
    </script>
</body>
</html>
